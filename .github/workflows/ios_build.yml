name: iOS Unsigned Build

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Disable MCP Plugin for CI
        run: |
          sed -i '' 's/"godot_mcp"//g' project.godot || true
          mv addons/godot_mcp addons/godot_mcp_disabled || true

      - name: Export Godot iOS Project
        uses: dulvui/godot4-ios-export@main
        with:
          godot-version: 4.6.2
          working-directory: .

      - name: Package .app into unsigned .ipa
        run: |
          # Find the exported Xcode project
          echo "=== Searching for .xcodeproj ==="
          find . -name "*.xcodeproj" -type d 2>/dev/null || true
          find . -name "*.app" -type d 2>/dev/null | head -10 || true

          # The dulvui action exports to ios/
          APP_PATH=$(find . -name "*.app" -path "*/Release-iphoneos/*" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | grep -v ".xcodeproj" | head -1)
          fi
          echo "Found .app: $APP_PATH"

          APP_NAME=$(basename "$APP_PATH")
          echo "App name: $APP_NAME"

          mkdir -p Payload
          cp -r "$APP_PATH" "Payload/"
          zip -r AstroForge.ipa Payload
          ls -lh AstroForge.ipa

      - name: Upload .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstroForge-Unsigned-IPA
          path: AstroForge.ipa
          if-no-files-found: error
