name: iOS Unsigned Build

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Godot 4.6.2
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_macos.universal.zip"
          unzip -q godot.zip
          xattr -rc "Godot.app" 2>/dev/null || true
          sudo mv "Godot.app" /Applications/Godot.app

      - name: Install iOS Export Templates
        run: |
          curl -L -o templates.tpz "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz"
          unzip -q templates.tpz
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/4.6.2.stable"
          mv templates/* "$HOME/Library/Application Support/Godot/export_templates/4.6.2.stable/"

      - name: Prepare Project
        run: |
          sed -i '' 's/"godot_mcp"//g' project.godot || true
          mv addons/godot_mcp addons/godot_mcp_disabled || true
          mkdir -p ios

      - name: Export Godot iOS Project
        run: |
          /Applications/Godot.app/Contents/MacOS/Godot \
            --headless --path "." \
            --export-release "iOS" "ios/AstroForge.xcodeproj" 2>&1 | tail -20 || true
          if [ ! -d "ios/AstroForge.xcodeproj" ]; then
            echo "Export failed!"
            exit 1
          fi
          echo "✅ Export OK"

      - name: Create Self-Signed Certificate
        run: |
          security create-keychain -p "ci" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci" ci.keychain
          security set-keychain-settings -t 7200 ci.keychain
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout /tmp/k.key -out /tmp/c.crt \
            -subj "/CN=iPhone Developer/O=CI/C=US"
          openssl pkcs12 -export -inkey /tmp/k.key -in /tmp/c.crt \
            -out /tmp/s.p12 -passout pass:ci
          security import /tmp/s.p12 -k ci.keychain -P ci \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "ci" ci.keychain
          CERT=$(security find-identity -v ci.keychain | grep "iPhone Developer" | awk '{print $2}' | head -1)
          echo "CERT_ID=$CERT" >> $GITHUB_ENV

      - name: Build Xcode Project
        run: |
          cd ios
          SCHEME=$(xcodebuild -project AstroForge.xcodeproj -list 2>/dev/null \
            | grep -A20 'Schemes:' | grep -v 'Schemes:' | grep -v '^$' | head -1 | xargs)
          [ -z "$SCHEME" ] && SCHEME="AstroForge"
          echo "Building scheme: $SCHEME"

          xcodebuild \
            -project AstroForge.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="$CERT_ID" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            PRODUCT_BUNDLE_IDENTIFIER=com.jan.astroforge \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            SWIFT_VERSION=5.0 \
            ENABLE_BITCODE=NO \
            clean build \
            SYMROOT=$(pwd)/build_output \
            2>&1 | tail -30

      - name: Package into IPA
        run: |
          APP=$(find ios/build_output -name "*.app" -type d | head -1)
          echo "Found: $APP"
          [ -z "$APP" ] && echo "No .app found!" && find ios -name "*.app" -type d && exit 1

          EXEC=$(defaults read "$APP/Info.plist" CFBundleExecutable 2>/dev/null)
          echo "Executable: $EXEC"
          [ -f "$APP/$EXEC" ] && echo "✅ Binary exists!" || echo "⚠️ Binary missing!"

          # Strip CI signature so Sideloadly can re-sign cleanly
          find "$APP" \( -name "*.dylib" -o -name "*.framework" \) | \
            xargs -I{} codesign --remove-signature {} 2>/dev/null || true
          codesign --remove-signature "$APP" 2>/dev/null || true

          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r AstroForge.ipa Payload
          echo "✅ IPA: $(du -h AstroForge.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AstroForge-Unsigned-IPA
          path: AstroForge.ipa
          if-no-files-found: error
