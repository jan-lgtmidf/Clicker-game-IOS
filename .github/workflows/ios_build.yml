name: iOS Unsigned Build

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Godot 4.6.2
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_macos.universal.zip"
          unzip -q godot.zip
          xattr -rc "Godot.app" 2>/dev/null || true
          sudo mv "Godot.app" /Applications/Godot.app

      - name: Install iOS Export Templates
        run: |
          curl -L -o templates.tpz "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz"
          unzip -q templates.tpz
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/4.6.2.stable"
          mv templates/* "$HOME/Library/Application Support/Godot/export_templates/4.6.2.stable/"

      - name: Prepare Project
        run: |
          # Disable MCP plugin
          sed -i '' 's/"godot_mcp"//g' project.godot || true
          mv addons/godot_mcp addons/godot_mcp_disabled || true
          # Create export directory
          mkdir -p ios

      - name: Export Godot iOS Project
        run: |
          /Applications/Godot.app/Contents/MacOS/Godot \
            --headless --path "." \
            --export-release "iOS" \
            "ios/AstroForge.xcodeproj" 2>&1 | tail -20 || true
          if [ ! -d "ios/AstroForge.xcodeproj" ]; then
            echo "ERROR: Godot export failed!"
            exit 1
          fi
          echo "✅ Xcode project created!"

      - name: Switch to Manual Signing
        run: |
          PBXPROJ="ios/AstroForge.xcodeproj/project.pbxproj"
          # Switch from Automatic to Manual signing to avoid conflicts
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' "$PBXPROJ" || true
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ" || true
          echo "Signing style in project:"
          grep -i "signingStyle\|ProvisioningStyle\|CODE_SIGN_STYLE" "$PBXPROJ" | head -5 || true

      - name: Create Self-Signed Certificate
        run: |
          security create-keychain -p "ci" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci" ci.keychain
          security set-keychain-settings -t 7200 ci.keychain
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout /tmp/k.key -out /tmp/c.crt \
            -subj "/CN=iPhone Developer/O=CI/C=US"
          openssl pkcs12 -export -inkey /tmp/k.key -in /tmp/c.crt \
            -out /tmp/s.p12 -passout pass:ci
          security import /tmp/s.p12 -k ci.keychain -P ci \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "ci" ci.keychain
          CERT=$(security find-identity -v ci.keychain | grep "iPhone Developer" | awk '{print $2}' | head -1)
          echo "CERT_ID=$CERT" >> $GITHUB_ENV
          echo "Certificate: $CERT"

      - name: Build Xcode Archive
        run: |
          SCHEME=$(xcodebuild -project ios/AstroForge.xcodeproj -list 2>/dev/null \
            | grep -A20 'Schemes:' | grep -v 'Schemes:' | grep -v '^$' | head -1 | xargs)
          [ -z "$SCHEME" ] && SCHEME="AstroForge"
          echo "Scheme: $SCHEME | Cert: $CERT_ID"

          xcodebuild archive \
            -project ios/AstroForge.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ios/AstroForge.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CERT_ID" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.jan.astroforge \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            ENABLE_BITCODE=NO \
            2>&1 | grep -E "(error:|warning:|BUILD|Signing|Archive)"
          echo "Archive contents:"
          ls -la ios/AstroForge.xcarchive/Products/Applications/ 2>/dev/null || \
            find ios/AstroForge.xcarchive -name "*.app" 2>/dev/null || \
            echo "No .app found in archive!"

      - name: Package into IPA
        run: |
          APP=$(find ios/AstroForge.xcarchive -name "*.app" -type d | head -1)
          echo "App: $APP"
          [ -z "$APP" ] && echo "ERROR: No .app found!" && exit 1

          # Verify binary exists
          EXEC=$(defaults read "$APP/Info.plist" CFBundleExecutable 2>/dev/null)
          echo "Executable name: $EXEC"
          ls -la "$APP/$EXEC" 2>/dev/null && echo "✅ Binary found!" || echo "⚠️ Binary missing!"

          # Remove our CI signature — Sideloadly will re-sign with your Apple ID
          find "$APP" -name "*.dylib" -o -name "*.framework" | \
            xargs -I{} codesign --remove-signature {} 2>/dev/null || true
          codesign --remove-signature "$APP" 2>/dev/null || true

          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r AstroForge.ipa Payload
          echo "IPA size: $(du -h AstroForge.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AstroForge-Unsigned-IPA
          path: AstroForge.ipa
          if-no-files-found: error
