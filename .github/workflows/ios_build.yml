name: iOS Unsigned Build

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup Godot 4.6.2
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_macos.universal.zip"
          unzip -q godot.zip
          xattr -rc "Godot.app" 2>/dev/null || true
          sudo mv "Godot.app" /Applications/Godot.app

      - name: Install iOS Export Templates
        run: |
          curl -L -o templates.tpz "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz"
          unzip -q templates.tpz
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/4.6.2.stable"
          mv templates/* "$HOME/Library/Application Support/Godot/export_templates/4.6.2.stable/"

      - name: Prepare Project
        run: |
          sed -i '' 's/"godot_mcp"//g' project.godot || true
          mv addons/godot_mcp addons/godot_mcp_disabled || true
          mkdir -p ios

      - name: Export Godot iOS Project
        run: |
          /Applications/Godot.app/Contents/MacOS/Godot \
            --headless --path "." \
            --export-release "iOS" "ios/AstroForge.xcodeproj" 2>&1 | tail -20 || true
          if [ ! -d "ios/AstroForge.xcodeproj" ]; then
            echo "Export failed!"
            exit 1
          fi
          # Fix: Replace Apple Distribution signing that Godot hardcodes with ad-hoc
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Distribution";/CODE_SIGN_IDENTITY = "-";/g' ios/AstroForge.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY\[sdk=iphoneos\*\] = "Apple Distribution";/CODE_SIGN_IDENTITY[sdk=iphoneos*] = "-";/g' ios/AstroForge.xcodeproj/project.pbxproj
          # Clear Development Team to avoid provisioning conflicts
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' ios/AstroForge.xcodeproj/project.pbxproj
          echo "✅ Export OK"

      - name: Build Xcode Project
        run: |
          cd ios
          SCHEME=$(xcodebuild -project AstroForge.xcodeproj -list 2>/dev/null \
            | grep -A20 'Schemes:' | grep -v 'Schemes:' | grep -v '^$' | head -1 | xargs)
          [ -z "$SCHEME" ] && SCHEME="AstroForge"
          echo "Building scheme: $SCHEME"

          xcodebuild \
            -project AstroForge.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.jan.astroforge \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            SWIFT_VERSION=5.0 \
            clean build \
            SYMROOT="$(pwd)/build_output" \
            2>&1 | tail -80

      - name: Package into IPA
        run: |
          APP=$(find ios/build_output -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "❌ No .app found!"
            find ios -name "*.app" -type d
            exit 1
          fi
          echo "✅ Found: $APP"

          # Remove ad-hoc signature so Sideloadly can re-sign with your Apple ID
          find "$APP" -name "*.dylib" -o -name "*.framework" | xargs -I{} codesign --remove-signature {} 2>/dev/null || true
          codesign --remove-signature "$APP" 2>/dev/null || true

          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -qr AstroForge.ipa Payload/
          echo "✅ IPA built: $(du -h AstroForge.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AstroForge-Unsigned-IPA
          path: AstroForge.ipa
          if-no-files-found: error
